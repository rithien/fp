[fp-belt-visualizer]
button-tooltip-on=Belt visualizer: ON for you. Hover a belt-connectable entity (belt, underground, splitter, loader, linked belt — ghosts too) and the whole connected belt line lights up in yellow: lane lines, arcs on turns, dashes between underground ends. Hold the item filtered on a splitter to trace only that item's side. Click to turn it OFF for yourself.
button-tooltip-off=Belt visualizer: OFF for you — hovering belts shows nothing extra. Click to turn it ON for yourself: hovering then highlights the whole belt line under the cursor.
toggled-on=[belt visualizer] Enabled for you — hover a belt to light up its whole line.
toggled-off=[belt visualizer] Disabled for you.
