[fp-bp-params]
button-tooltip=BP Params — copy the parameters section (names, formulas, number dependencies) from one blueprint to another. Useful after fixing a parametrised blueprint, without re-typing all the formulas.
window-title=Copy blueprint parameters
instructions=Pick up a blueprint and click a slot to load it. Source = the old parametrised blueprint, target = the corrected one. "Copy parameters" puts the merged blueprint into your cursor. Clicking a slot with an empty cursor clears it.
source-label=Source (with parameters)
target-label=Target (corrected)
slot-tooltip=Click with a blueprint in your cursor to load it. Click with an empty cursor to clear the slot.
slot-empty=Empty — pick up a blueprint and click the slot.
slot-set=__1__ — parameters: __2__
unnamed-blueprint=(unnamed blueprint)
copy=Copy parameters → cursor
copy-success=Copied __1__ parameter(s) — the merged blueprint is in your cursor. Number parameters bind by value; icon (ID) parameters may need re-assigning in the parameter editor.
empty-cursor=Your cursor is empty — pick up a blueprint first.
not-blueprint=That is not a blueprint (blueprint books are not supported).
empty-blueprint=That blueprint is empty.
library-error=That blueprint comes from the blueprint library — copy it to your inventory first and pick it up as an item.
decode-error=Could not decode the blueprint string.
encode-error=Could not encode the merged blueprint.
no-source-params=The source blueprint has no parameters.
missing-source=Load the source blueprint first.
missing-target=Load the target blueprint first.
cursor-busy=Could not empty your cursor — make room in your inventory.
import-error=Importing the merged blueprint failed.
close=Close
edit-tooltip=Edit this blueprint's parameters (names, values, variables, formulas).
editor-title=Editing parameters — __1__
col-name=Name
col-number=Value
col-variable=Variable
col-formula=Formula
type-id=[id]
type-number=[number]
editor-apply=Save → cursor
editor-cancel=Cancel
editor-raw=RAW JSON
editor-raw-tooltip=Switch to editing the raw JSON of the parameters section (unsaved field changes are discarded).
editor-table=Table
editor-table-tooltip=Switch back to the field table (unsaved JSON changes are discarded).
invalid-json=Invalid JSON — the parameters section must be an array of objects.
no-params=This blueprint has no parameters.
invalid-number=Parameter #__1__: the value is not a valid number.
edit-success=Saved — the edited blueprint is in your cursor.
