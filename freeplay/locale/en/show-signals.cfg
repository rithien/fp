[fp-show-signals]
button-tooltip-on=Rail signal blocks: ON for you. Rails are tinted by signal block, like when holding a rail signal in hand — permanently, not just while placing signals. Click to turn it OFF for yourself.
button-tooltip-off=Rail signal blocks: OFF for you — rails look standard. Click to turn it ON for yourself: rails get tinted by signal block, like when holding a rail signal in hand.
toggled-on=[rail signals] Enabled for you — rails are now tinted by signal block.
toggled-off=[rail signals] Disabled for you.
