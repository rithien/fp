[fp-circuit-highlight]
button-tooltip-on=Circuit highlight: ON for you. Hover an entity wired to a circuit network (combinator, lamp, inserter with a wire, ...) and its red/green network lights up — colored lines along the wires + node dots on the connectors. Click to turn it OFF for yourself.
button-tooltip-off=Circuit highlight: OFF for you — hovering circuit entities shows nothing extra. Click to turn it ON for yourself: hovering then highlights the circuit network under the cursor.
toggled-on=[circuit highlight] Enabled for you — hover a circuit entity to light up its network.
toggled-off=[circuit highlight] Disabled for you.
