[fp-admin]
panel-title=Admin panel
tab-toggles=Toggles
tab-sliders=Sliders
tab-dropdowns=Dropdowns
tab-actions=Actions
tab-test=Test
close-tooltip=Close

overhead-scale-caption=Overhead text size
overhead-scale-tooltip=Size (scale) of the over-head translation text (toggle "Translate overhead"). 1.0 = default in-world font size; range 0.8-4.0, step 0.2. Rendered with scale_with_zoom (stays the same on-screen size at any zoom). Applies live to new bubbles; ones already on screen keep their size until they fade.
overhead-ttl-caption=Overhead text time
overhead-ttl-tooltip=How long the over-head translation bubble stays visible, in seconds (toggle "Translate overhead"). Range 2-20 s, step 1 s. Applies live to new bubbles.
overhead-color-caption=Overhead text color
overhead-color-tooltip=Color of the over-head translation text (toggle "Translate overhead"). Pick from a curated, readability-tuned palette. The Sample label next to the dropdown previews the chosen color. Applies live to new bubbles.
color-white=White
color-yellow=Yellow
color-cyan=Cyan
color-green=Green
color-orange=Orange
color-pink=Pink
color-red=Red
color-black=Black
preview-sample=Sample

blueprints-caption=Blueprints
blueprints-tooltip=ON: blueprint library, import string and import from file work normally (vanilla). OFF: blocks 3 input_actions in the "Default" permission group (grab_blueprint_record, import_blueprint_string, import_blueprint). Copy/paste from the map, undo and cancel-build remain.

far-reach-caption=Far reach
far-reach-tooltip=ON: all players (all forces) get a +150 bonus to build/reach/resource_reach/item_drop distance (item_pickup gets no bonus). Respawn and new players inherit it automatically (force bonus). OFF: standard Factorio distance.

no-handcrafting-caption=No hand-crafting
no-handcrafting-tooltip=ON: blocks hand-crafting of all recipes for the "player" force — players must use machines. OFF: standard Factorio. Based on comfy/no_handcrafting, without auto-spawning machines — the admin sets them up.

rate-calc-caption=Rate Calculator
rate-calc-tooltip=ON: every player sees the Rate Calculator button on the top bar. Click → the cursor gets a copy-paste tool; drag over machines to compute their rates (items/s) and show them in a GUI. Port of raiguard/RateCalculator (items/s only).

car-finder-caption=Car Finder
car-finder-tooltip=ON: every player sees the Car Finder button on the top bar. Click → list of cars / tanks / spidertrons on the current surface, sorted by distance with a clickable GPS tag. When the player holds a spidertron remote, the camera jumps to the spidertron. Port of Wmitty/car-finder (no SHIFT+V hotkey — the scenario has no data stage).

feedback-caption=Feedback
feedback-tooltip=ON: every player sees the Feedback button on the top bar. Click → opens a window to enter a suggestion or report, which goes to the clusterio panel (Factorio Polska → under news) and to Discord (admin channel). OFF: the button disappears and reports are not accepted.

bp-params-caption=BP Params
bp-params-tooltip=ON: every ADMIN sees the BP Params button on the top bar (admin-only tool). Click → opens a window with two blueprint slots; the parameters section (names, formulas, number dependencies) is copied from the source blueprint to the corrected one, the result lands in the cursor. ID parameters (icons) still need re-assigning in the in-game parameter editor. OFF: the button disappears and open windows close.

chat-mode-caption=Chat translation
chat-mode-tooltip=How factorio-translate translations are printed to chat. "off": nothing to chat. "universal": one line for everyone (game.print, "<player> [lang] <text>"). "per-player": a separate line for each recipient in THEIR own language (t[locale], no original fallback — the original is already on chat natively; the speaker is skipped). Independent of "Translate overhead". Note: the plugin still calls the (paid) translation API whenever its own `enabled` field is on — disable that field in the clusterio web panel to stop API costs entirely.
chat-mode-off=off
chat-mode-universal=universal
chat-mode-per-player=per-player

test-sim-chat-caption=Simulate foreign chat (full pipeline)
test-sim-chat-tooltip=Emits a [FP-TRANSLATE] tag as if another player ("TestBot") wrote a chat message in a language DIFFERENT from your locale (locales set = {your locale, source}). Exercises the FULL pipeline: factorio-translate plugin → language detection → (paid) translation API → /fpo → chat mode + overhead. Expect the result within ~1-2 s; no result = plugin side (disabled plugin, API error — check instance log). Solo-test tool: the fake speaker differs from you, so you ARE a recipient.
test-sim-chat-emitted=## - Test: emitted [FP-TRANSLATE] (speaker __1__, source language __2__, your locale __3__). If the plugin is enabled, expect a translation shortly.
test-sim-fpo-caption=Simulate /fpo payload (scenario only)
test-sim-fpo-tooltip=Dispatches a fake /fpo payload directly to the scenario sink — NO plugin, NO API. Deterministically verifies the scenario side: "Chat translation" mode (universal → one game.print line; per-player → a chat line in YOUR language) and "Translate overhead" (bubble above your character). Works even with the plugin disabled.
test-sim-fpo-done=## - Test: dispatched a local /fpo payload. Check chat/overhead according to the current "Chat translation" mode and "Translate overhead" toggle.

translate-overhead-caption=Translate overhead (per-viewer)
translate-overhead-tooltip=ON: translations are shown above each viewer's OWN character (not the speaker's), picked per viewer by their locale (message in the viewer's language = original, otherwise the translation). Prefixed with the speaker's name ("Name: text"). Visible regardless of distance to the speaker; the speaker does not see their own message. Rapid messages STACK upward instead of overlapping (newest at the bottom, max 3 — the oldest is dropped); each fades after the configured time. OFF: no overhead text. Independent of the "Chat translation" dropdown.

show-signals-caption=Show rail signals
show-signals-tooltip=ON: rail signal block overlay active for players + new joiners; each player can turn it off for themselves in the Tools panel (per-user opt-out, preference kept). OFF: overlay disabled and the Tools-panel cell hidden for everyone.

fast-start-caption=Fast start
fast-start-tooltip=ON: every online player (who hasn't received it yet) + every joiner gets power-armor-mk2 + equipment + 25× construction-robot. If the player has NO armor — auto-equip. If they HAVE their own armor — the whole package goes loose into the inventory. OFF: stop handing it out to newcomers (existing items are not taken back). Per-player one-shot. Enabling this disables fast_start_mech.

fast-start-mech-caption=Fast start (mech)
fast-start-mech-tooltip=ON: every online player (who hasn't received it yet) + every joiner gets mech-armor + 11× exoskeleton + 8× battery-mk3 + roboport-mk2 + night-vision + 50× construction-robot. Per-player one-shot. Enabling this disables fast_start.

always-day-caption=Always day
always-day-tooltip=ON: the day/night cycle is frozen at noon on all planet surfaces (surface.planet — nauvis + Space Age planets, if any). OFF: standard cycle on planets. Space platforms and mod surfaces (e.g. sandbox labs) are never touched — they manage their own always_day. Global surface.always_day setting — no per-player apply needed.

even-distribution-caption=Even distribution
even-distribution-tooltip=Global master switch. ON: every player sees the Even distribution button on the top bar and (by default) Ctrl+drag a stack across multiple machines/chests splits the held item evenly between them (e.g. 100 plates over 4 furnaces = 25 each, ~0.5s after the drag). Each player can turn the effect OFF just for themselves with that button (not everyone wants changed Ctrl+drag). Changes vanilla Ctrl+drag (normally fills each to a full stack). Half-stack (Ctrl+Shift+drag) and quality items keep vanilla behaviour. OFF: feature disabled for everyone and the top-bar button disappears, standard Factorio Ctrl+drag. Port of even-distribution mod, "distribute" mode only.

circuit-highlight-caption=Circuit highlight
circuit-highlight-tooltip=Global master switch. ON: hovering an entity wired to a circuit network (combinator, lamp, inserter with a wire, ...) highlights the red/green circuit network it sits on — colored lines along the wires + node dots on the connectors, visible only to that player. Mouseover-only: the highlight clears when the cursor leaves the entity. Each player can turn the effect OFF just for themselves with the top-bar button. OFF: feature disabled for everyone and the top-bar button disappears. Port of circuit_visualizer (mouseover only — overlay, manual ALT+V pin and shortcuts dropped: the scenario has no data stage).

auto-pipe-connectors-caption=Auto pipe connectors
auto-pipe-connectors-tooltip=Global master switch. ON: every player sees the Auto pipe connectors button on the top bar and (by default) placing an underground pipe one tile / a corner away from another underground (or a building with a fluid connection) auto-places the single connecting pipe — a pipe ghost if the player has none in inventory, a tile ghost first over water/space/lava. Each player can turn the effect OFF just for themselves with that button (auto-build changes how placing undergrounds behaves). Only on player/blueprint builds, not robot builds. OFF: feature disabled for everyone and the top-bar button disappears. Port of Sparr/automatic-underground-pipe-connectors (runtime control-stage; no data stage needed).

inserter-throughput-caption=Inserter throughput
inserter-throughput-tooltip=Global master switch. ON: hovering an inserter (or its ghost) shows its ideal throughput in items/s above it — calculated under perfect conditions (full supply, never waiting), accounting for stack size, hand swing/extension speed, quality and belt-speed caps. Visible only to that player, mouseover-only (clears when the cursor leaves). Each player can turn the effect OFF just for themselves with the top-bar Tools button. OFF: feature disabled for everyone and the tools-panel cell disappears. Port of inserter-throughput (hover display only — the toggle keybind, sprite button and the /it-stopwatch live measuring tool dropped: the scenario has no data stage).

belt-visualizer-caption=Belt visualizer
belt-visualizer-tooltip=Global master switch. ON: hovering a belt-connectable entity (belt, underground, splitter, lane splitter, loader, linked belt — ghosts too) highlights the whole connected belt line in yellow — lane lines, arcs on turns, dashed lines between underground ends — visible only to that player. Mouseover-only: the highlight clears when the cursor leaves the line; rotating/building/mining a highlighted belt refreshes the overlay after ~1s. Each player can turn the effect OFF just for themselves in the Tools panel. OFF: feature disabled for everyone and the tools-panel cell disappears. Port of belt-visualizer 2.1.4 (hover only — the G/SHIFT+G/CTRL+G keybinds, lane cycling, shortcut and mod-settings dropped: the scenario has no data stage).

todo-list-caption=Todo List
todo-list-tooltip=Global master switch. ON: every player sees the Todo List button on the top bar — a shared team task list (add tasks, assign them to players, mark them done, reorder, clean up). Untrusted players can only modify tasks they created; trusted players and admins can modify any task. OFF: the button disappears and open windows close (task data is kept). Port of the Todo-List mod (Standard scope — no subtasks/export/import/search; the scenario has no data stage, so there is no SHIFT+T hotkey).

spawn-logo-caption=Spawn logo
spawn-logo-tooltip=Global master switch. ON: renders the "Factorio Polska" logo on the ground at the starting planet's spawn — a sprite plate (file/img/world/logo-pad.png) + optional glow + text lines below (e.g. the server address), visible to all players. OFF: removes all spawn-logo render objects. The look (image, scale, glow, text lines) is configured in Constants.spawn_logo; /spawnlogo (admin) force-redraws and reports status. Replaces the old indestructible info display-panel.

debug-log-caption=Debug log
debug-log-tooltip=ON: detailed traces (`DebugLog.log` in hot-paths like the Rate Calculator dispatcher) go to `factorio-current.log`. Enable ad-hoc when diagnosing a bug, disable after capturing the trace (grep `[rate_calc]` / `[debug_log]`). Does not affect native `log()` or `[ANTIGRIEF-LOG]`.

reveal-150-caption=Reveal 150
reveal-150-tooltip=Reveals the map (chart) in a 300x300 square around the admin's position (radius=150). Applies to the admin's force. Note: on ungenerated terrain it forces the engine to generate new chunks at once — possible brief lag spike (FIX31 #20).

reveal-300-caption=Reveal 300
reveal-300-tooltip=Reveals the map (chart) in a 600x600 square around the admin's position (radius=300). Applies to the admin's force. Note: on ungenerated terrain it forces the engine to generate ~324 chunks at once — possible brief lag spike (FIX31 #20).

hide-map-caption=Hide map
hide-map-tooltip=Uncharts all chunks on the admin's surface for the admin's force — restores fog of war. Chunks remain (generated state). Re-exploration reveals them again. Runs in the background (batch per tick) — no freeze.

delete-unrevealed-chunks-caption=Delete unrevealed chunks
delete-unrevealed-chunks-tooltip=Deletes only chunks NOT charted (revealed) by ANY player force on the admin's surface — explored/charted chunks remain. Chunks containing player-force entities or a standing player are always skipped, so this stays safe even after "Hide map" (which uncharts everything without deleting content). cancel_charting clears pending chart requests so just-deleted chunks don't regenerate from the radar queue. Deletion runs in the background (batch per tick) — no freeze.

show-speakers-caption=Show speakers
show-speakers-tooltip=Lists (only to your chat) all programmable speakers of the admin's force on their surface: placer's nick + clickable GPS tag.

destroy-speakers-caption=Delete speakers
destroy-speakers-tooltip=Deletes ALL programmable speakers of the admin's force on their surface. No undo — recommended after "Show speakers".

regenerate-resources-caption=Regenerate resources
regenerate-resources-tooltip=Regenerates resources on the admin's surface. Infinite resources (e.g. crude-oil) reset to initial_amount; finite SOLID ore patches (iron/copper/coal/stone, Vulcanus tungsten/calcite) deleted + regenerated from the map gen seed (deterministic — same places). Finite FLUID resources (Aquilo lithium-brine, fluorine) are PRESERVED, never deleted: regenerate_entity cannot restore them on planets, so deleting would lose them permanently. Mining-drill update_connections afterwards. Scan runs in the background (batch per tick).

destroy-decoratives-caption=Remove decoratives
destroy-decoratives-tooltip=Deletes all decoratives (grass, pebbles, flowers) on the admin's surface. Does not affect entities or resource patches. Minor UPS gain during rendering. Runs in the background (batch per tick).

destroy-cliffs-caption=Remove cliffs (around)
destroy-cliffs-tooltip=Deletes all cliffs in a 200x200 square (size=100) around the admin's position. Local — you delete in the area where you stand, not globally. Based on cliff explosives without waiting for research.

fast-start-redistribute-caption=Re-distribute fast start
fast-start-redistribute-tooltip=Re-hands the CURRENTLY ENABLED fast start variant (fast_start or fast_start_mech) to every online player who has an EMPTY armor slot (auto-equipped). Players who already wear armor are SKIPPED (no loose duplicate). Resets the one-shot flag for the targeted players, then re-marks them as received (a later join won't hand it out again). Does nothing if neither variant is enabled.

place-landing-pad-caption=Place landing pad
place-landing-pad-tooltip=Places a cargo-landing-pad (Space Age) at the hovered entity's position, or 5 tiles to the right of you if nothing is hovered (clicking the panel usually clears the hover). raise_built=true so on_built handlers fire. Requires Space Age (the prototype must exist).

