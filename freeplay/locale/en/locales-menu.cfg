[fp-locales-menu]
button-tooltip=Translations — your personal settings: the language you read chat translations in, and the bubbles above your character (on/off, size, color).
window-title=Translation settings
close=Close
bubbles-section=Bubbles above your character
language-caption=Language
language-tooltip=Language you want to READ chat translations in. "Default" follows your game language. Pick a different one if you play with e.g. an English interface but want translations in your native language. Applies to bubbles and to per-player chat translations.
language-default=Default (game language)
enable-caption=Show translation bubbles above my character
enable-tooltip=Unchecking hides the bubbles only for you (chat translations keep working). The server admin controls whether the feature is available at all.
size-caption=Text size
size-tooltip=Size of the bubble text, visible only to you. Defaults to the server setting; move the slider to override it.
color-caption=Color
color-tooltip=Color of the bubble text, visible only to you. Defaults to the server setting; pick a color to override it.
preview-sample=Sample
reset-caption=Reset to server defaults
reset-tooltip=Removes your personal overrides — size and color return to the values set by the admin, bubbles are turned back on, translation language returns to your game language.
