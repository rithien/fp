[fp-even-distribution]
button-tooltip-on=Even distribution: ON for you. Ctrl+drag a stack across multiple machines/chests splits the held item evenly between them (e.g. 100 plates over 4 furnaces = 25 each). Click to turn it OFF for yourself (back to vanilla Ctrl+drag).
button-tooltip-off=Even distribution: OFF for you — vanilla Ctrl+drag (fills the first machine with a full stack). Click to turn it ON for yourself — Ctrl+drag then splits the held stack evenly across machines/chests.
toggled-on=[even distribution] Enabled for you — Ctrl+drag now splits the stack evenly across machines.
toggled-off=[even distribution] Disabled for you — back to vanilla Ctrl+drag.
