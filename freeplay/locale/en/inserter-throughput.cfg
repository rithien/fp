[fp-inserter-throughput]
button-tooltip-on=Inserter throughput: ON for you. Hover an inserter (or its ghost) and its ideal throughput in items/s shows above it — calculated under perfect conditions (full supply, no waiting). Click to turn it OFF for yourself.
button-tooltip-off=Inserter throughput: OFF for you — hovering an inserter shows nothing extra. Click to turn it ON for yourself: hovering an inserter then shows its ideal items/s above it.
toggled-on=[inserter throughput] Enabled for you — hover an inserter to see its ideal items/s.
toggled-off=[inserter throughput] Disabled for you.
