[fp-belt-visualizer]
button-tooltip-on=Podświetlanie linii pasów: WŁĄCZONE dla Ciebie. Najedź kursorem na encję pasową (taśmę, tunel podziemny, splitter, loader, linked belt — także duchy), a cała połączona linia podświetli się na żółto: tory obu stron taśmy, łuki na zakrętach, przerywana linia między końcami tunelu. Trzymając w ręce przedmiot z filtra splittera, prześledzisz tylko jego stronę. Kliknij, aby WYŁĄCZYĆ u siebie.
button-tooltip-off=Podświetlanie linii pasów: WYŁĄCZONE dla Ciebie — najechanie na pasy nic dodatkowego nie pokazuje. Kliknij, aby WŁĄCZYĆ u siebie: najechanie podświetli wtedy całą linię pasa pod kursorem.
toggled-on=[podświetlanie pasów] Włączone dla Ciebie — najedź na pas, aby podświetlić całą jego linię.
toggled-off=[podświetlanie pasów] Wyłączone dla Ciebie.
