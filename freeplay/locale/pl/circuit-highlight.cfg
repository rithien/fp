[fp-circuit-highlight]
button-tooltip-on=Podświetlanie obwodów: WŁĄCZONE dla Ciebie. Najedź kursorem na encję podłączoną do sieci sygnałowej (kombinator, lampa, inserter z drutem, ...), a jej czerwona/zielona sieć podświetli się — kolorowe linie wzdłuż drutów + kropki na connectorach. Kliknij, aby WYŁĄCZYĆ u siebie.
button-tooltip-off=Podświetlanie obwodów: WYŁĄCZONE dla Ciebie — najechanie na encje z sieciami nic nie pokazuje. Kliknij, aby WŁĄCZYĆ u siebie: najechanie podświetli wtedy obwód pod kursorem.
toggled-on=[podświetlanie obwodów] Włączone dla Ciebie — najedź na encję z siecią sygnałową, aby podświetlić obwód.
toggled-off=[podświetlanie obwodów] Wyłączone dla Ciebie.
