[fp-commands]
trust-help=<gracz> - Oznacz gracza jako zaufanego (tylko admin)
untrust-help=<gracz> - Odbierz graczowi status zaufanego (tylko admin)
fp-help=<tekst> - Factorio print (alias tylko dla RCON, zachowuje osiągnięcia)
fpo-help=<json> - Ujście tłumaczeń (czat + dymek nad głową per-widz), tylko RCON
trust-now=[trust] __1__ jest teraz zaufany.
untrust-now=[untrust] __1__ nie jest już zaufany.
err-admin-only=[__1__] Tej komendy mogą używać tylko administratorzy.
err-trusted-only=[__1__] Tej komendy mogą używać tylko zaufani gracze lub administratorzy.
err-missing-param=[__1__] Brak wymaganego parametru: __2__
err-player-not-found=[__1__] Nie znaleziono gracza: __2__
err-not-number=[__1__] Parametr __2__ musi być liczbą, otrzymano: __3__
news-help=- Pokaż ekran powitalny z aktualnościami serwera (RCON: reset statusu dla wszystkich)
jail-help=<gracz> [powód] - Wsadź gracza do jaila: grupa bez uprawnień (admin lub RCON)
unjail-help=<gracz> - Wyciągnij gracza z jaila, powrót do uprawnień Default (admin lub RCON)
jail-unknown-player=[jail] NOT applied: player __1__ has never been on this server — check the nickname.
jail-already-jailed=[jail] __1__ is already jailed — nothing changed.
unjail-not-jailed=[unjail] __1__ is not jailed — nothing changed (check the nickname).

; --- Komendy debug/admin (/sessions*) — dev-facing → angielski; wartości identyczne z locale/en ---
sessionsthreshold-help=<minutes> - Override auto-trust threshold for testing; 0 = restore default 3h (admin-only)
sessionsstatus-help=[player] - Show sessions state (global if no player) (admin-only)
threshold-minutes=__1__ minutes
threshold-minutes-hours=__1__ minutes (__2__ hours)
sessionsthreshold-result=[sessionsthreshold] __1__ → __2__
sessionsstatus-player=[sessionsstatus] __1__: online_time=__2__ ticks (__3__ min), sessions=__4__ ticks (__5__ min), online_track=__6__, trusted=__7__, manually_untrusted=__8__
sessionsstatus-global=[sessionsstatus] threshold=__1__, sessions=__2__ entries, trusted=__3__ players, online_track=__4__ entries
