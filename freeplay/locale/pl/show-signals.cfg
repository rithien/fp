[fp-show-signals]
button-tooltip-on=Bloki sygnałowe torów: WŁĄCZONE dla Ciebie. Tory są kolorowane wg bloków sygnałowych, jak przy trzymaniu sygnału kolejowego w ręce — na stałe, nie tylko przy stawianiu sygnałów. Kliknij, aby WYŁĄCZYĆ u siebie.
button-tooltip-off=Bloki sygnałowe torów: WYŁĄCZONE dla Ciebie — tory wyglądają standardowo. Kliknij, aby WŁĄCZYĆ u siebie: tory będą kolorowane wg bloków sygnałowych, jak przy trzymaniu sygnału kolejowego w ręce.
toggled-on=[sygnały kolejowe] Włączone dla Ciebie — tory są kolorowane wg bloków sygnałowych.
toggled-off=[sygnały kolejowe] Wyłączone dla Ciebie.
