[fp-commands]
trust-help=<player> - Mark player as trusted (admin-only)
untrust-help=<player> - Revoke player trusted status (admin-only)
fp-help=<text> - Factorio print (RCON-only alias, preserves achievements)
fpo-help=<json> - Translation sink (chat + per-viewer overhead), RCON-only
trust-now=[trust] __1__ is now trusted.
untrust-now=[untrust] __1__ is no longer trusted.
err-admin-only=[__1__] Only admins can use this command.
err-trusted-only=[__1__] Only trusted players or admins can use this command.
err-missing-param=[__1__] Missing required parameter: __2__
err-player-not-found=[__1__] Player not found: __2__
err-not-number=[__1__] Parameter __2__ must be a number, got: __3__
news-help=- Show the welcome screen with server news (RCON: reset status for everyone)
jail-help=<player> [reason] - Jail player: move to the no-permissions group (admin or RCON)
unjail-help=<player> - Remove player from jail, back to Default permissions (admin or RCON)

; --- Debug/admin commands (/sessions*) — dev-facing → English; pl values identical ---
sessionsthreshold-help=<minutes> - Override auto-trust threshold for testing; 0 = restore default 3h (admin-only)
sessionsstatus-help=[player] - Show sessions state (global if no player) (admin-only)
threshold-minutes=__1__ minutes
threshold-minutes-hours=__1__ minutes (__2__ hours)
sessionsthreshold-result=[sessionsthreshold] __1__ → __2__
sessionsstatus-player=[sessionsstatus] __1__: online_time=__2__ ticks (__3__ min), sessions=__4__ ticks (__5__ min), online_track=__6__, trusted=__7__, manually_untrusted=__8__
sessionsstatus-global=[sessionsstatus] threshold=__1__, sessions=__2__ entries, trusted=__3__ players, online_track=__4__ entries
