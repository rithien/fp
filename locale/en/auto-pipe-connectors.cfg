[fp-auto-pipe-connectors]
button-tooltip-on=Auto pipe connectors: ON for you. When you place an underground pipe one tile / a corner away from another underground (or a building with a fluid connection), the single connecting pipe is placed automatically (a pipe ghost if you have none in your inventory). Click to turn it OFF for yourself (back to placing pipes manually).
button-tooltip-off=Auto pipe connectors: OFF for you — placing an underground pipe never auto-places a connecting pipe. Click to turn it ON for yourself — undergrounds placed a corner / one tile apart then get the connecting pipe automatically.
toggled-on=[auto pipe connectors] Enabled for you — undergrounds placed one tile / a corner apart now auto-place the connecting pipe.
toggled-off=[auto pipe connectors] Disabled for you — no more automatic connecting pipes.
