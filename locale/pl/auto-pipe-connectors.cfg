[fp-auto-pipe-connectors]
button-tooltip-on=Automatyczne łączenie rur: WŁĄCZONE dla Ciebie. Gdy postawisz rurę podziemną o jedno pole / w narożniku od innej podziemnej (albo budynku z połączeniem płynów), łączący odcinek rury stawia się automatycznie (ghost rury, jeśli nie masz jej w ekwipunku). Kliknij, aby WYŁĄCZYĆ go dla siebie (powrót do ręcznego stawiania rur).
button-tooltip-off=Automatyczne łączenie rur: WYŁĄCZONE dla Ciebie — postawienie rury podziemnej nigdy nie stawia automatycznie łącznika. Kliknij, aby WŁĄCZYĆ go dla siebie — podziemne postawione o jedno pole / w narożniku dostaną wtedy łączącą rurę automatycznie.
toggled-on=[automatyczne łączenie rur] Włączone dla Ciebie — podziemne postawione o jedno pole / w narożniku stawiają teraz łączącą rurę automatycznie.
toggled-off=[automatyczne łączenie rur] Wyłączone dla Ciebie — koniec z automatycznymi łącznikami rur.
