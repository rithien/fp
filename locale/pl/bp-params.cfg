[fp-bp-params]
button-tooltip=BP Params — kopiowanie sekcji parametrów (nazwy, formuły, zależności liczbowe) z jednego blueprinta do drugiego. Przydatne po poprawieniu sparametryzowanego blueprinta — bez ponownego wpisywania wszystkich formuł.
window-title=Kopiowanie parametrów blueprinta
instructions=Weź blueprint do kursora i kliknij slot, żeby go wczytać. Źródłowy = stary sparametryzowany blueprint, docelowy = poprawiony. „Kopiuj parametry" wstawia scalony blueprint do kursora. Klik w slot z pustym kursorem czyści slot.
source-label=Źródłowy (z parametrami)
target-label=Docelowy (poprawiony)
slot-tooltip=Kliknij z blueprintem w kursorze, żeby go wczytać. Kliknij z pustym kursorem, żeby wyczyścić slot.
slot-empty=Pusty — weź blueprint do kursora i kliknij slot.
slot-set=__1__ — parametry: __2__
unnamed-blueprint=(blueprint bez nazwy)
